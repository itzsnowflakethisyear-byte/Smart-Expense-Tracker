<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Expense Tracker</title>
  <style>
    :root {
      --bg: #020617;
      --panel: rgba(15, 23, 42, 0.92);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #22c55e;
      --accent-2: #38bdf8;
      --danger: #fb923c;
      --border: rgba(255,255,255,0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--bg), #111827);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .container { max-width: 1180px; margin: 0 auto; display: grid; gap: 20px; }
    .hero, .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.3);
      padding: 20px;
    }

    .hero { display: flex; justify-content: space-between; align-items: center; gap: 18px; flex-wrap: wrap; }
    .hero h1 { margin: 0 0 8px; font-size: 28px; }
    .hero p { margin: 0; color: var(--muted); }

    .hero-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .budget-field { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 14px; }
    .budget-field input { width: 110px; }

    .grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 20px; }
    form { display: grid; gap: 12px; }
    .field { display: grid; gap: 6px; }
    label { font-weight: 600; color: #cbd5e1; }
    input, select, button, textarea {
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0f172a;
      color: var(--text);
      font-size: 15px;
    }

    textarea { min-height: 72px; resize: vertical; }
    button {
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      border: none;
      font-weight: 700;
    }
    button.secondary {
      background: linear-gradient(135deg, #334155, #475569);
    }
    button:hover { filter: brightness(1.05); }

    .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 12px; }
    .stat { padding: 14px; border-radius: 14px; background: #0f172a; border: 1px solid var(--border); }
    .stat strong { display: block; font-size: 20px; margin-top: 6px; }
    .stat span { color: var(--muted); font-size: 13px; }

    .progress-wrap { margin-top: 12px; }
    .progress-bar {
      width: 100%; height: 10px; border-radius: 999px; background: rgba(255,255,255,0.1); overflow: hidden;
    }
    .progress-bar > div { height: 100%; width: 0; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width 0.25s ease; }
    .small { color: var(--muted); font-size: 13px; }

    .panel-top { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
    .panel-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .list { display: grid; gap: 10px; margin-top: 14px; }
    .expense-item {
      display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 12px 14px; background: #0f172a; border-radius: 12px; border: 1px solid var(--border);
    }
    .expense-item .meta { color: var(--muted); font-size: 13px; }
    .expense-item .actions { display: flex; align-items: center; gap: 8px; }
    .pill { display: inline-block; padding: 4px 8px; border-radius: 999px; background: rgba(56, 189, 248, 0.18); color: #7dd3fc; font-size: 12px; margin-top: 4px; }
    .insight { margin-bottom: 10px; padding: 12px 14px; border-radius: 12px; background: rgba(34, 197, 94, 0.12); border: 1px solid rgba(34, 197, 94, 0.22); color: #dcfce7; }
    .breakdown { margin-top: 12px; }
    .breakdown-list { list-style: none; padding: 0; margin: 8px 0 0; display: grid; gap: 8px; }
    .breakdown-list li { display: flex; justify-content: space-between; padding: 8px 10px; border-radius: 10px; background: rgba(255,255,255,0.04); }

    @media (max-width: 860px) {
      .grid, .summary-grid { grid-template-columns: 1fr; }
      .expense-item { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <div>
        <h1>Smart Expense Tracker</h1>
        <p>Track daily spending, review your monthly summary, and get smarter insights to stay on budget.</p>
      </div>
      <div class="hero-actions">
        <label class="budget-field" for="budgetGoal">
          Monthly budget
          <input id="budgetGoal" name="budgetGoal" type="number" min="0" step="50" value="1200" />
        </label>
        <button id="saveBudgetBtn" type="button">Save Budget</button>
      </div>
    </section>

    <div class="grid">
      <section class="panel">
        <h2>Add New Expense</h2>
        <form id="expenseForm">
          <div class="field">
            <label for="description">Description</label>
            <input id="description" name="description" placeholder="Coffee, groceries, transport..." required />
          </div>
          <div class="field">
            <label for="amount">Amount (AUD $)</label>
            <input id="amount" name="amount" type="number" min="0" step="0.01" placeholder="0.00" required />
          </div>
          <div class="field">
            <label for="category">Category</label>
            <select id="category" name="category">
              <option>Food</option>
              <option>Travel</option>
              <option>Shopping</option>
              <option>Utilities</option>
              <option>Entertainment</option>
              <option>Health</option>
              <option>Other</option>
            </select>
          </div>
          <div class="field">
            <label for="date">Date</label>
            <input id="date" name="date" type="date" required />
          </div>
          <div class="field">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" placeholder="Optional details"></textarea>
          </div>
          <button type="submit">Save Expense</button>
        </form>
      </section>

      <section class="panel">
        <h2>Monthly Snapshot</h2>
        <div class="summary-grid">
          <div class="stat">
            <span>Total Spent</span>
            <strong id="totalSpent">$0.00</strong>
          </div>
          <div class="stat">
            <span>Remaining Budget</span>
            <strong id="remainingBudget">$0.00</strong>
          </div>
          <div class="stat">
            <span>Top Category</span>
            <strong id="topCategory">—</strong>
          </div>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar"><div id="budgetProgress"></div></div>
          <div id="budgetStatus" class="small" style="margin-top: 6px;">Budget not set</div>
        </div>
        <h3 style="margin-top: 18px;">AI-Style Insights</h3>
        <div id="insights"></div>
      </section>
    </div>

    <section class="panel">
      <div class="panel-top">
        <h2>This Month's Expenses</h2>
        <div class="panel-actions">
          <select id="filterCategory" aria-label="Filter by category">
            <option value="All">All categories</option>
          </select>
          <button id="exportBtn" type="button" class="secondary">Export JSON</button>
          <button id="clearBtn" type="button" class="secondary">Clear All</button>
        </div>
      </div>
      <div class="breakdown">
        <h3>Category Totals</h3>
        <ul id="breakdownList" class="breakdown-list"></ul>
      </div>
      <div id="expenseList" class="list"></div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = 'smart-expense-tracker-data';
    const BUDGET_KEY = 'smart-expense-tracker-budget';
    const form = document.getElementById('expenseForm');
    const expenseList = document.getElementById('expenseList');
    const totalSpentEl = document.getElementById('totalSpent');
    const remainingBudgetEl = document.getElementById('remainingBudget');
    const topCategoryEl = document.getElementById('topCategory');
    const insightsEl = document.getElementById('insights');
    const budgetGoalInput = document.getElementById('budgetGoal');
    const budgetProgressEl = document.getElementById('budgetProgress');
    const budgetStatusEl = document.getElementById('budgetStatus');
    const filterCategoryEl = document.getElementById('filterCategory');
    const breakdownListEl = document.getElementById('breakdownList');

    const defaultExpenses = [
      { id: createId(), description: 'Groceries', amount: 82.4, category: 'Food', date: new Date().toISOString().slice(0, 10), notes: 'Weekly groceries' },
      { id: createId(), description: 'Train pass', amount: 54, category: 'Travel', date: new Date().toISOString().slice(0, 10), notes: 'Monthly transport' }
    ];

    let expenses = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultExpenses;
    let budgetGoal = Number(localStorage.getItem(BUDGET_KEY)) || 1200;
    let selectedCategory = 'All';

    function createId() {
      return typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function formatCurrency(value) {
      return new Intl.NumberFormat('en-AU', { style: 'currency', currency: 'AUD' }).format(value);
    }

    function getMonthExpenses() {
      const now = new Date();
      const month = now.getMonth();
      const year = now.getFullYear();
      return expenses.filter((item) => {
        const d = new Date(item.date);
        return d.getMonth() === month && d.getFullYear() === year;
      });
    }

    function getFilteredExpenses() {
      const monthExpenses = getMonthExpenses();
      if (selectedCategory === 'All') return monthExpenses;
      return monthExpenses.filter((item) => item.category === selectedCategory);
    }

    function populateCategoryFilter() {
      const categories = [...new Set(expenses.map((item) => item.category))].sort();
      const options = ['All', ...categories].map((category) => `<option value="${category}" ${selectedCategory === category ? 'selected' : ''}>${category}</option>`).join('');
      filterCategoryEl.innerHTML = options;
    }

    function renderBreakdown(monthExpenses) {
      const byCategory = monthExpenses.reduce((acc, item) => {
        acc[item.category] = (acc[item.category] || 0) + Number(item.amount);
        return acc;
      }, {});

      const entries = Object.entries(byCategory).sort((a, b) => b[1] - a[1]);
      if (!entries.length) {
        breakdownListEl.innerHTML = '<li>No spending yet</li>';
        return;
      }

      breakdownListEl.innerHTML = entries.map(([name, total]) => `<li><span>${name}</span><strong>${formatCurrency(total)}</strong></li>`).join('');
    }

    function render() {
      const monthExpenses = getMonthExpenses();
      const filteredExpenses = getFilteredExpenses();
      const total = monthExpenses.reduce((sum, item) => sum + Number(item.amount), 0);
      const remaining = Math.max(budgetGoal - total, 0);
      const budgetPercent = budgetGoal > 0 ? Math.min((total / budgetGoal) * 100, 100) : 0;

      const byCategory = monthExpenses.reduce((acc, item) => {
        acc[item.category] = (acc[item.category] || 0) + Number(item.amount);
        return acc;
      }, {});

      const topCategory = Object.entries(byCategory).sort((a, b) => b[1] - a[1])[0];
      totalSpentEl.textContent = formatCurrency(total);
      remainingBudgetEl.textContent = formatCurrency(remaining);
      topCategoryEl.textContent = topCategory ? `${topCategory[0]} (${formatCurrency(topCategory[1])})` : '—';
      budgetGoalInput.value = budgetGoal;
      budgetProgressEl.style.width = `${budgetPercent}%`;
      budgetStatusEl.textContent = budgetGoal > 0
        ? `${formatCurrency(total)} of ${formatCurrency(budgetGoal)} spent (${Math.round(budgetPercent)}%)`
        : 'Set a budget goal to track progress';

      const insights = [];
      if (monthExpenses.length === 0) {
        insights.push('No expenses yet. Add your first purchase to build your monthly view.');
      } else {
        if (topCategory) {
          insights.push(`Your biggest spending area is ${topCategory[0]} at ${formatCurrency(topCategory[1])}.`);
        }
        if (total > budgetGoal && budgetGoal > 0) {
          insights.push('You are over your monthly budget. Consider trimming discretionary spending this week.');
        } else if (budgetGoal > 0) {
          insights.push('Spending looks healthy so far. You still have room in your monthly budget.');
        }
        if (byCategory.Food && byCategory.Food > total * 0.35) {
          insights.push('Food is taking a large share of your budget. Try meal planning to reduce it.');
        }
      }

      insightsEl.innerHTML = insights.map((item) => `<div class="insight">${item}</div>`).join('');
      renderBreakdown(monthExpenses);
      populateCategoryFilter();

      if (!filteredExpenses.length) {
        expenseList.innerHTML = '<div class="small">No expenses match this filter for this month.</div>';
        return;
      }

      expenseList.innerHTML = filteredExpenses
        .sort((a, b) => new Date(b.date) - new Date(a.date))
        .map((item) => `
          <div class="expense-item">
            <div>
              <strong>${item.description}</strong>
              <div class="meta">${new Date(item.date).toLocaleDateString('en-AU')}</div>
              ${item.notes ? `<div class="meta">${item.notes}</div>` : ''}
              <span class="pill">${item.category}</span>
            </div>
            <div class="actions">
              <strong>${formatCurrency(item.amount)}</strong>
              <button type="button" class="secondary" data-delete-id="${item.id}">Delete</button>
            </div>
          </div>
        `).join('');
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const formData = new FormData(form);
      const expense = {
        id: createId(),
        description: formData.get('description').toString().trim(),
        amount: Number(formData.get('amount')),
        category: formData.get('category').toString(),
        date: formData.get('date').toString(),
        notes: formData.get('notes').toString().trim()
      };

      if (!expense.description || Number.isNaN(expense.amount) || expense.amount <= 0) {
        alert('Please enter a valid expense.');
        return;
      }

      expenses.push(expense);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
      form.reset();
      document.getElementById('date').value = new Date().toISOString().slice(0, 10);
      render();
    });

    document.getElementById('saveBudgetBtn').addEventListener('click', () => {
      const value = Number(budgetGoalInput.value);
      if (Number.isNaN(value) || value < 0) {
        alert('Please enter a valid monthly budget.');
        return;
      }
      budgetGoal = value;
      localStorage.setItem(BUDGET_KEY, String(budgetGoal));
      render();
    });

    filterCategoryEl.addEventListener('change', (event) => {
      selectedCategory = event.target.value;
      render();
    });

    expenseList.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-delete-id]');
      if (!button) return;
      const id = button.getAttribute('data-delete-id');
      expenses = expenses.filter((item) => item.id !== id);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
      render();
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      if (!confirm('Remove all expenses from this browser?')) return;
      expenses = [];
      localStorage.removeItem(STORAGE_KEY);
      render();
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(expenses, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'expenses.json';
      link.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById('date').value = new Date().toISOString().slice(0, 10);
    render();
  </script>
</body>
</html>
